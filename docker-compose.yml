services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: titan_os
      POSTGRES_PASSWORD: titan_os
      POSTGRES_DB: titan_os_development
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U titan_os -d titan_os_development" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "bin/rails db:prepare && bin/rails server -b 0.0.0.0"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgres://titan_os:titan_os@db:5432/titan_os_development
      RAILS_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  bundle_cache:
